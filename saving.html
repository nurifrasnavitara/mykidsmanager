<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tabungan — My Kids Manager</title>
<meta name="theme-color" content="#FBC02D">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<header class="app-header">
  <div class="header-row">
    <div>
      <div class="greeting"><a href="dashboard.html" style="color:inherit;"><i class="fa-solid fa-arrow-left"></i></a></div>
      <h1>Tabungan</h1>
    </div>
    <button class="header-icon-btn" data-toggle-theme aria-label="Ganti tema"></button>
  </div>
</header>

<main class="container floating-card" data-ptr>
  <div class="card card-glass slide-up flex items-center justify-between">
    <span class="text-soft text-sm">Pilih Anak</span>
    <select id="childSelect" style="padding:8px 12px;border:none;background:var(--secondary);border-radius:10px;"></select>
  </div>

  <div class="section-title"><h2>Target Tabungan</h2><a href="#" id="addTargetLink">+ Tambah Target</a></div>
  <div id="targetList" class="stagger" style="display:flex;flex-direction:column;gap:14px;"></div>

  <div class="section-title"><h2>Riwayat Menabung</h2></div>
  <div id="savingHistory" style="display:flex;flex-direction:column;gap:10px;"></div>
</main>

<!-- Add target modal -->
<div id="targetModal" style="display:none;position:fixed;inset:0;z-index:150;">
  <div class="modal-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,.4);"></div>
  <div class="card slide-up" style="position:absolute;left:12px;right:12px;bottom:24px;max-width:456px;margin:0 auto;">
    <h3 class="fw-700" style="margin-bottom:14px;">Tambah Target Tabungan</h3>
    <form id="targetForm">
      <div class="field"><label>Nama Target</label>
        <div class="input-wrap"><i class="fa-solid fa-bullseye"></i><input type="text" id="targetTitle" required placeholder="Contoh: Sepeda Baru"></div>
      </div>
      <div class="field"><label>Target (Rp)</label>
        <div class="input-wrap"><i class="fa-solid fa-money-bill"></i><input type="number" id="targetAmount" min="1000" step="1000" required placeholder="1000000"></div>
      </div>
      <div class="flex gap-12">
        <button type="button" id="targetCancel" class="btn btn-outline btn-block ripple">Batal</button>
        <button type="submit" class="btn btn-primary btn-block ripple">Simpan</button>
      </div>
    </form>
  </div>
</div>

<!-- Add saving amount modal -->
<div id="saveModal" style="display:none;position:fixed;inset:0;z-index:150;">
  <div class="modal-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,.4);"></div>
  <div class="card slide-up" style="position:absolute;left:12px;right:12px;bottom:24px;max-width:456px;margin:0 auto;">
    <h3 class="fw-700" style="margin-bottom:14px;">Tambah Tabungan</h3>
    <form id="saveForm">
      <div class="field"><label>Jumlah (Rp)</label>
        <div class="input-wrap"><i class="fa-solid fa-piggy-bank"></i><input type="number" id="saveAmount" min="1000" step="1000" required placeholder="50000"></div>
      </div>
      <div class="flex gap-12">
        <button type="button" id="saveCancel" class="btn btn-outline btn-block ripple">Batal</button>
        <button type="submit" class="btn btn-primary btn-block ripple">Simpan</button>
      </div>
    </form>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item" data-page="dashboard.html"><i class="fa-solid fa-house"></i>Home</a>
  <a href="wallet.html" class="nav-item" data-page="wallet.html"><i class="fa-solid fa-wallet"></i>Wallet</a>
  <a href="needs.html" class="nav-fab ripple"><i class="fa-solid fa-plus"></i></a>
  <a href="report.html" class="nav-item" data-page="report.html"><i class="fa-solid fa-chart-simple"></i>Laporan</a>
  <a href="profile.html" class="nav-item" data-page="profile.html"><i class="fa-solid fa-user"></i>Profil</a>
</nav>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script src="js/saving.js"></script>
</body>
</html>
