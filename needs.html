<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kebutuhan — My Kids Manager</title>
<meta name="theme-color" content="#FBC02D">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<header class="app-header">
  <div class="header-row">
    <div>
      <div class="greeting"><a href="dashboard.html" style="color:inherit;"><i class="fa-solid fa-arrow-left"></i></a></div>
      <h1>Kebutuhan</h1>
    </div>
    <button class="header-icon-btn" data-toggle-theme aria-label="Ganti tema"></button>
  </div>
</header>

<main class="container floating-card" data-ptr>
  <div class="card card-glass slide-up flex items-center justify-between">
    <span class="text-soft text-sm">Pilih Anak</span>
    <select id="childSelect" style="padding:8px 12px;border:none;background:var(--secondary);border-radius:10px;"></select>
  </div>

  <div class="field mt-16">
    <div class="input-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Cari kebutuhan...">
    </div>
  </div>

  <div class="chip-row mt-16" id="categoryGrid"></div>

  <div class="section-title"><h2>Daftar Kebutuhan</h2><a href="#" id="addNeedLink">+ Tambah</a></div>
  <div id="needsItems" class="stagger" style="display:flex;flex-direction:column;gap:10px;"></div>
</main>

<div id="needModal" style="display:none;position:fixed;inset:0;z-index:150;">
  <div class="modal-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,.4);"></div>
  <div class="card slide-up" style="position:absolute;left:12px;right:12px;bottom:24px;max-width:456px;margin:0 auto;">
    <h3 class="fw-700" style="margin-bottom:14px;">Tambah Kebutuhan</h3>
    <form id="needForm">
      <div class="field"><label>Kategori</label>
        <select id="needCategory" style="width:100%;padding:12px 14px;border-radius:14px;border:1.5px solid var(--secondary);background:var(--secondary);">
          <option value="pakaian">👕 Pakaian</option>
          <option value="sepatu">👟 Sepatu</option>
          <option value="sekolah">📚 Sekolah</option>
          <option value="kesehatan">💊 Kesehatan</option>
          <option value="makanan">🍔 Makanan</option>
          <option value="mainan">🧸 Mainan</option>
        </select>
      </div>
      <div class="field"><label>Nama Barang</label>
        <div class="input-wrap"><i class="fa-solid fa-box"></i><input type="text" id="needItem" required placeholder="Contoh: Buku tulis"></div>
      </div>
      <div class="field"><label>Perkiraan Harga (Rp)</label>
        <div class="input-wrap"><i class="fa-solid fa-tag"></i><input type="number" id="needPrice" min="0" step="1000" required placeholder="55000"></div>
      </div>
      <div class="flex gap-12">
        <button type="button" id="needCancel" class="btn btn-outline btn-block ripple">Batal</button>
        <button type="submit" class="btn btn-primary btn-block ripple">Simpan</button>
      </div>
    </form>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item" data-page="dashboard.html"><i class="fa-solid fa-house"></i>Home</a>
  <a href="wallet.html" class="nav-item" data-page="wallet.html"><i class="fa-solid fa-wallet"></i>Wallet</a>
  <a href="#" class="nav-fab ripple" id="fabAdd"><i class="fa-solid fa-plus"></i></a>
  <a href="report.html" class="nav-item" data-page="report.html"><i class="fa-solid fa-chart-simple"></i>Laporan</a>
  <a href="profile.html" class="nav-item" data-page="profile.html"><i class="fa-solid fa-user"></i>Profil</a>
</nav>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script src="js/needs.js"></script>
</body>
</html>
