<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kesehatan — My Kids Manager</title>
<meta name="theme-color" content="#FBC02D">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<header class="app-header">
  <div class="header-row">
    <div>
      <div class="greeting"><a href="dashboard.html" style="color:inherit;"><i class="fa-solid fa-arrow-left"></i></a></div>
      <h1>Kesehatan</h1>
    </div>
    <button class="header-icon-btn" data-toggle-theme aria-label="Ganti tema"></button>
  </div>
</header>

<main class="container floating-card" data-ptr>
  <div class="card card-glass slide-up flex items-center justify-between">
    <span class="text-soft text-sm">Pilih Anak</span>
    <select id="childSelect" style="padding:8px 12px;border:none;background:var(--secondary);border-radius:10px;"></select>
  </div>

  <div class="chip-row mt-16" id="filterChips">
    <button class="badge badge-neutral" data-filter="semua">Semua</button>
    <button class="badge badge-neutral" data-filter="imunisasi">💉 Imunisasi</button>
    <button class="badge badge-neutral" data-filter="checkup">🩺 Checkup</button>
    <button class="badge badge-neutral" data-filter="sakit">🤒 Sakit</button>
    <button class="badge badge-neutral" data-filter="obat">💊 Obat</button>
  </div>

  <div class="section-title"><h2>Riwayat Kesehatan</h2><a href="#" id="addHealthLink">+ Tambah</a></div>
  <div id="healthItems" class="stagger" style="display:flex;flex-direction:column;gap:10px;"></div>
</main>

<div id="healthModal" style="display:none;position:fixed;inset:0;z-index:150;">
  <div class="modal-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,.4);"></div>
  <div class="card slide-up" style="position:absolute;left:12px;right:12px;bottom:24px;max-width:456px;margin:0 auto;">
    <h3 class="fw-700" style="margin-bottom:14px;">Tambah Catatan Kesehatan</h3>
    <form id="healthForm">
      <div class="field"><label>Jenis</label>
        <select id="healthType" style="width:100%;padding:12px 14px;border-radius:14px;border:1.5px solid var(--secondary);background:var(--secondary);">
          <option value="imunisasi">💉 Imunisasi</option>
          <option value="checkup">🩺 Checkup / Kontrol</option>
          <option value="sakit">🤒 Sakit</option>
          <option value="obat">💊 Obat</option>
        </select>
      </div>
      <div class="field"><label>Judul</label>
        <div class="input-wrap"><i class="fa-solid fa-pen"></i><input type="text" id="healthTitle" required placeholder="Contoh: Imunisasi lanjutan"></div>
      </div>
      <div class="field"><label>Tanggal</label>
        <div class="input-wrap"><i class="fa-solid fa-calendar"></i><input type="date" id="healthDate"></div>
      </div>
      <div class="field"><label>Catatan (opsional)</label>
        <div class="input-wrap"><i class="fa-solid fa-note-sticky"></i><input type="text" id="healthNote" placeholder="Detail tambahan"></div>
      </div>
      <div class="flex gap-12">
        <button type="button" id="healthCancel" class="btn btn-outline btn-block ripple">Batal</button>
        <button type="submit" class="btn btn-primary btn-block ripple">Simpan</button>
      </div>
    </form>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item" data-page="dashboard.html"><i class="fa-solid fa-house"></i>Home</a>
  <a href="wallet.html" class="nav-item" data-page="wallet.html"><i class="fa-solid fa-wallet"></i>Wallet</a>
  <a href="needs.html" class="nav-fab ripple"><i class="fa-solid fa-plus"></i></a>
  <a href="report.html" class="nav-item" data-page="report.html"><i class="fa-solid fa-chart-simple"></i>Laporan</a>
  <a href="profile.html" class="nav-item" data-page="profile.html"><i class="fa-solid fa-user"></i>Profil</a>
</nav>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script src="js/health.js"></script>
</body>
</html>
