<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Profil — My Kids Manager</title>
<meta name="theme-color" content="#FBC02D">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<header class="app-header">
  <div class="header-row">
    <div>
      <div class="greeting"><a href="dashboard.html" style="color:inherit;"><i class="fa-solid fa-arrow-left"></i></a></div>
      <h1>Profil Anak</h1>
    </div>
    <button class="header-icon-btn" data-toggle-theme aria-label="Ganti tema"></button>
  </div>
</header>

<main class="container floating-card">
  <div class="card card-glass slide-up flex items-center justify-between">
    <span class="text-soft text-sm">Pilih Anak</span>
    <select id="childSelect" style="padding:8px 12px;border:none;background:var(--secondary);border-radius:10px;"></select>
  </div>

  <button id="editProfileBtn" class="btn btn-outline btn-block ripple mt-16"><i class="fa-solid fa-pen"></i> Edit Profil Anak</button>

  <div id="profileCard" class="mt-16"></div>

  <div class="section-title"><h2>Catatan</h2></div>
  <div class="card">
    <form id="noteForm" class="flex gap-8">
      <div class="input-wrap" style="flex:1;"><input type="text" id="noteInput" placeholder="Tulis catatan tentang anak..."></div>
      <button type="submit" class="btn btn-primary btn-sm ripple">Simpan</button>
    </form>
  </div>

  <div class="section-title"><h2>Pengaturan</h2></div>
  <div class="card" style="display:flex;flex-direction:column;gap:14px;">
    <div class="flex items-center justify-between">
      <span class="text-sm fw-600"><i class="fa-solid fa-moon" style="color:var(--accent);width:18px;"></i> Mode Gelap</span>
      <button data-toggle-theme class="btn btn-ghost btn-sm ripple"></button>
    </div>
    <div class="flex items-center justify-between" style="display:none;" data-install-app>
      <span class="text-sm fw-600"><i class="fa-solid fa-download" style="color:var(--accent);width:18px;"></i> Install Aplikasi</span>
      <button class="btn btn-ghost btn-sm ripple">Install</button>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-sm fw-600"><i class="fa-solid fa-right-from-bracket" style="color:var(--danger);width:18px;"></i> Keluar</span>
      <button id="logoutBtn" class="btn btn-outline btn-sm ripple">Logout</button>
    </div>
  </div>
</main>

<div id="editModal" style="display:none;position:fixed;inset:0;z-index:150;">
  <div class="modal-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,.4);"></div>
  <div class="card slide-up" style="position:absolute;left:12px;right:12px;top:24px;bottom:24px;max-width:456px;margin:0 auto;overflow-y:auto;">
    <h3 class="fw-700" style="margin-bottom:14px;">Edit Profil Anak</h3>
    <form id="editForm">
      <div class="field"><label>Emoji</label>
        <div class="input-wrap"><input type="text" id="editEmoji" maxlength="4" placeholder="👦"></div>
      </div>
      <div class="field"><label>Nama</label>
        <div class="input-wrap"><i class="fa-solid fa-user"></i><input type="text" id="editName" required></div>
      </div>
      <div class="field"><label>Tanggal Lahir</label>
        <div class="input-wrap"><i class="fa-solid fa-cake-candles"></i><input type="date" id="editDob"></div>
      </div>
      <div class="field"><label>Sekolah</label>
        <div class="input-wrap"><i class="fa-solid fa-school"></i><input type="text" id="editSchool"></div>
      </div>
      <div class="field"><label>Ukuran Baju</label>
        <div class="input-wrap"><i class="fa-solid fa-shirt"></i><input type="text" id="editClothingSize" placeholder="Contoh: M (Anak)"></div>
      </div>
      <div class="field"><label>Ukuran Sepatu</label>
        <div class="input-wrap"><i class="fa-solid fa-shoe-prints"></i><input type="text" id="editShoeSize" placeholder="Contoh: 35"></div>
      </div>
      <div class="field"><label>Golongan Darah</label>
        <div class="input-wrap"><i class="fa-solid fa-droplet"></i><input type="text" id="editBloodType" placeholder="Contoh: O"></div>
      </div>
      <div class="field"><label>Hobi</label>
        <div class="input-wrap"><i class="fa-solid fa-star"></i><input type="text" id="editHobby"></div>
      </div>
      <div class="flex gap-12">
        <button type="button" id="editCancel" class="btn btn-outline btn-block ripple">Batal</button>
        <button type="submit" class="btn btn-primary btn-block ripple">Simpan</button>
      </div>
    </form>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item" data-page="dashboard.html"><i class="fa-solid fa-house"></i>Home</a>
  <a href="wallet.html" class="nav-item" data-page="wallet.html"><i class="fa-solid fa-wallet"></i>Wallet</a>
  <a href="needs.html" class="nav-fab ripple"><i class="fa-solid fa-plus"></i></a>
  <a href="report.html" class="nav-item" data-page="report.html"><i class="fa-solid fa-chart-simple"></i>Laporan</a>
  <a href="profile.html" class="nav-item active" data-page="profile.html"><i class="fa-solid fa-user"></i>Profil</a>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
